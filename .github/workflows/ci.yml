name: ci

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run backend test suite
        run: |
          python -m unittest \
            tests.test_persistence \
            tests.test_api \
            tests.test_operations \
            tests.test_workforce \
            tests.test_deploy

  smoke-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Start backend runtime
        run: |
          chmod +x scripts/run_platform.sh
          scripts/run_platform.sh --host 127.0.0.1 --port 8091 --fresh --seed >/tmp/magon-runtime.log 2>&1 &
          echo $! >/tmp/magon-runtime.pid

      - name: Wait for health
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8091/health >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Runtime failed to become healthy" >&2
          cat /tmp/magon-runtime.log >&2 || true
          exit 1

      - name: Verify key backend pages
        run: |
          curl -fsS http://127.0.0.1:8091/health >/dev/null
          curl -fsS http://127.0.0.1:8091/ui/companies >/dev/null
          curl -fsS http://127.0.0.1:8091/ui/review-queue >/dev/null

      - name: Stop runtime
        if: always()
        run: |
          if [ -f /tmp/magon-runtime.pid ]; then
            kill "$(cat /tmp/magon-runtime.pid)" 2>/dev/null || true
            wait "$(cat /tmp/magon-runtime.pid)" 2>/dev/null || true
          fi
          cat /tmp/magon-runtime.log || true

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build web shell
        run: npm run build
