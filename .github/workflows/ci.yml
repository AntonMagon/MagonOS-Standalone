name: ci

on:
  push:
    branches:
      - develop
      - main
      - "codex/**"
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  foundation-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Repo verify workflow
        run: ./scripts/verify_workflow.sh

      - name: Foundation migration check
        run: bash ./scripts/foundation_migration_check.sh

  foundation-smoke:
    runs-on: ubuntu-latest
    needs: foundation-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run foundation smoke suite
        run: |
          bash ./scripts/foundation_supplier_smoke_check.sh
          bash ./scripts/foundation_request_smoke_check.sh
          bash ./scripts/foundation_offer_smoke_check.sh
          bash ./scripts/foundation_order_smoke_check.sh
          bash ./scripts/foundation_files_documents_smoke_check.sh
          bash ./scripts/foundation_messages_dashboards_smoke_check.sh
          bash ./scripts/foundation_wave1_demo_smoke_check.sh

  web-quality:
    runs-on: ubuntu-latest
    needs: foundation-quality
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build web shell
        run: npm run build
