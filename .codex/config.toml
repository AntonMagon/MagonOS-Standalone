[project]
name = "MagonOS-Standalone"
root = "/Users/anton/Desktop/MagonOS-Standalone"

[context]
required = [
  "AGENTS.md",
  "docs/current-project-state.md",
  "docs/ru/README.md",
  "docs/ru/current-project-state.md",
  ".codex/project-memory.md",
  "docs/repo-workflow.md",
]

optional = [
  "docs/ru/repo-workflow.md",
  "docs/ru/code-map.md",
  "docs/audit-context.md",
  "docs/business-logic-parity-audit.md",
  "docs/operating-layer-migration-audit.md",
  "docs/deployment.md",
  "docs/extraction-notes.md",
  "apps/web/README.md",
]

[truth]
order = [
  "src/",
  "apps/web/",
  "scripts/",
  "tests/",
  "AGENTS.md",
  "docs/",
  "skills/",
]

[paths]
backend_source = "src/magon_standalone"
web_app = "apps/web"
data_dir = "data"
backend_db = "postgresql://magon:magon@127.0.0.1:5432/magon_foundation"
legacy_donor_repo = "/Users/anton/Desktop/MagonOS/MagonOS"

[workflow]
restore_context = "scripts/restore_context.sh"
install_repo_guards = "scripts/install_repo_guards.sh"
start_unified = "scripts/run_foundation_unified.sh --fresh"
start_backend = ".venv/bin/python scripts/run_foundation_api.py --host 127.0.0.1 --port 8091"
pipeline_fixture = ".venv/bin/python scripts/run_pipeline.py --fixture tests/fixtures/vn_suppliers_raw.json"
test_backend = ".venv/bin/python -m unittest tests.test_foundation_api tests.test_foundation_suppliers tests.test_foundation_orders"
verify_workflow = "scripts/verify_workflow.sh --with-web"
finalize_task = ".venv/bin/python scripts/finalize_task.py --summary \"...\" --changed \"...\" --verify \"./scripts/verify_workflow.sh --with-web\""
web_typecheck = "cd apps/web && npm run typecheck"
